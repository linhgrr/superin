<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Superin</title>

    <!-- PWA / Theme — theme-color auto-injected by vite-plugin-pwa from manifest -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Superin" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#b05c32" />

    <script>
      (function() {
        try {
          var raw = localStorage.getItem("superin_settings");
          var parsed = raw ? JSON.parse(raw) : {};
          var theme = parsed.theme;
          if (theme === "dark" || (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.add("light");
          }
        } catch(e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/favicon.png" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Shin SuperApp</title>

    <!-- PWA / Theme — theme-color auto-injected by vite-plugin-pwa from manifest -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shin" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#b05c32" />

    <!-- Sync theme before React renders — prevents FOUC -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem("shin:user-settings");
          if (!stored) return;
          var settings = JSON.parse(stored);
          var root = document.documentElement;
          var isDark = settings.theme === "dark" ||
            (settings.theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          root.classList.add(isDark ? "dark" : "light");
        } catch(e) {}
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
